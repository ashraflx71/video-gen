<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 AI | محرك الصور الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0000ff; --black: #000000; }
        body { background: var(--black); color: #fff; font-family: 'Tajawal', sans-serif; text-align: center; padding: 20px; font-size: 22px; margin: 0; }
        .card { border: 2px solid var(--blue); border-radius: 15px; padding: 25px; background: #121212; max-width: 650px; margin: 20px auto; box-shadow: 0 0 25px rgba(0,0,255,0.4); }
        .status { background: #000; color: #00ff00; padding: 12px; border-radius: 8px; margin: 15px 0; font-family: monospace; font-size: 18px; border: 1px solid #333; }
        
        select { 
            width: 100%; padding: 15px; border-radius: 10px; background: #000; color: #fff; 
            border: 1px solid var(--blue); font-size: 20px; margin-bottom: 20px; font-family: 'Tajawal';
        }

        .post-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 10px; margin-bottom: 20px; 
            overflow: hidden; text-align: right; transition: 0.3s;
        }
        .post-card:hover { border-color: var(--blue); transform: translateY(-5px); }
        
        /* معالج الصور الافتراضية */
        .post-thumb { 
            width: 100%; height: 180px; background: linear-gradient(45deg, #000033, #0000ff); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            color: #fff; font-size: 24px; font-weight: bold; text-align: center; padding: 10px;
        }

        .post-content { padding: 15px; }
        .post-title { color: #fff; text-decoration: none; font-size: 20px; display: block; margin-bottom: 10px; }
        
        .btn { background: var(--blue); color: #fff; padding: 18px; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: var(--blue);">Creative 2026 AI</h1>
    <p style="font-size: 18px; color: #aaa;">معالج الصور والمحتوى الذكي | أشرف حسن</p>
    
    <select id="blogSelect">
        <option value="https://ashraf-creative.blogspot.com">1. Creative (الرئيسية)</option>
        <option value="https://ashrafhassan2026.blogspot.com">2. Ashraf Hassan 2026</option>
        <option value="https://www.sherifpro.com">3. Sherif Pro</option>
        <option value="https://creative2026.blogspot.com">4. Creative 2026</option>
        <option value="https://ashraf-demo1.blogspot.com">5. Ashraf Demo 1</option>
        <option value="https://optimum2026.blogspot.com">6. Optimum 2026</option>
    </select>

    <div class="status" id="display">> المحرك جاهز لمعالجة الصور...</div>
    <button class="btn" id="mainBtn" onclick="fetchWithAI()">جلب المقالات وتحليل الصور</button>

    <div id="feed" style="margin-top:25px;"></div>
</div>

<script>
async function fetchWithAI() {
    const blogUrl = document.getElementById('blogSelect').value;
    const display = document.getElementById('display');
    const feed = document.getElementById('feed');
    const btn = document.getElementById('mainBtn');

    btn.disabled = true;
    display.innerText = `> جاري تحليل المحرك...`;

    try {
        const rssUrl = `${blogUrl.replace(/\/$/, "")}/feeds/posts/default?alt=json`;
        const response = await fetch(rssUrl);
        const data = await response.json();

        display.innerText = "> تم معالجة الصور والمقالات بنجاح!";
        feed.innerHTML = "";

        const entries = data.feed.entry || [];
        entries.slice(0, 6).forEach(entry => {
            const title = entry.title.$t;
            const link = entry.link.find(l => l.rel === 'alternate').href;
            
            // محاولة إيجاد صورة داخل المقال
            let imgSrc = "";
            if (entry.media$thumbnail) {
                imgSrc = entry.media$thumbnail.url.replace("s72-c", "s1600");
            }

            // بناء الكارت
            const postCard = document.createElement('div');
            postCard.className = "post-card";
            
            // إذا لم توجد صورة، ننشئ غلافاً بالذكاء البرمجي يحمل العنوان
            const thumbHTML = imgSrc 
                ? `<img src="${imgSrc}" style="width:100%; height:180px; object-fit:cover;">`
                : `<div class="post-thumb"><span>${title}</span></div>`;

            postCard.innerHTML = `
                ${thumbHTML}
                <div class="post-content">
                    <a href="${link}" target="_blank" class="post-title">⚡ ${title}</a>
                    <button onclick="window.open('${link}')" style="background:none; border:1px solid var(--blue); color:var(--blue); padding:5px 10px; border-radius:5px; cursor:pointer;">قراءة المزيد</button>
                </div>
            `;
            feed.appendChild(postCard);
        });

        btn.disabled = false;
    } catch (error) {
        display.style.color = "red";
        display.innerText = "> خطأ في سحب البيانات.";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
