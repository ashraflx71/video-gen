<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | YouTube & Studio</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: var(--gold); font-family: Arial; margin: 0; padding: 15px; text-align: center; }
        .main-card { max-width: 500px; margin: auto; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; background: #050505; }
        
        /* شريط جلب اليوتيوب */
        .yt-box { display: flex; gap: 5px; margin-bottom: 20px; }
        .yt-input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        .yt-btn { background: #f00; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* منطقة النص والزرار */
        textarea { width: 100%; height: 70px; background: #111; color: #fff; border: 1px solid var(--gold); border-radius: 10px; padding: 10px; box-sizing: border-box; }
        .action-btn { background: var(--gold); color: #000; border: none; padding: 12px; width: 100%; margin: 10px 0; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* منطقة العرض الذكية */
        .display-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222; }
        #ytFrame { width: 100%; height: 100%; display: none; border: none; }
        #localVid { width: 100%; height: 100%; display: none; }
        
        /* النص الذهبي */
        #caption { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: var(--gold); padding: 10px 0; font-size: 22px; font-weight: bold; display: none; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>Creative 2026 Studio</h2>

        <div class="yt-box">
            <input type="text" id="ytUrl" class="yt-input" placeholder="ضع رابط فيديو يوتيوب هنا...">
            <button class="yt-btn" onclick="fetchYT()">جلب 📺</button>
        </div>

        <textarea id="msgIn" placeholder="اكتب النص الذي تريد ظهوره..."></textarea>
        <button class="action-btn" onclick="applyText()">تطبيق النص على المعاينة ✍️</button>

        <div class="display-wrap">
            <iframe id="ytFrame" allow="autoplay"></iframe>
            <video id="localVid" controls playsinline></video>
            <div id="caption"></div>
            <p id="waitMsg" style="color:#444; margin-top:15%;">بانتظار الفيديو...</p>
        </div>

        <input type="file" id="fIn" accept="video/*" style="display:none">
        <button class="action-btn" style="background:none; border:1px solid var(--gold); color:var(--gold);" onclick="document.getElementById('fIn').click()">📲 أو ارفع فيديو من هاتفك</button>
    </div>

    <script>
        const ytFrame = document.getElementById('ytFrame');
        const localVid = document.getElementById('localVid');
        const cap = document.getElementById('caption');
        const waitMsg = document.getElementById('waitMsg');

        // وظيفة جلب فيديو يوتيوب
        function fetchYT() {
            const url = document.getElementById('ytUrl').value;
            const videoId = extractId(url);
            if (videoId) {
                localVid.style.display = "none";
                ytFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                ytFrame.style.display = "block";
                waitMsg.style.display = "none";
                cap.style.display = "block";
            } else {
                alert("يا هندسة، الرابط غير صحيح، يرجى التأكد منه.");
            }
        }

        // وظيفة استخراج الـ ID من الرابط
        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : false;
        }

        function applyText() {
            const val = document.getElementById('msgIn').value;
            if(val) {
                cap.innerText = val;
                cap.style.display = "block";
            }
        }

        // رفع محلي
        document.getElementById('fIn').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                ytFrame.style.display = "none";
                localVid.src = URL.createObjectURL(file);
                localVid.style.display = "block";
                waitMsg.style.display = "none";
                cap.style.display = "block";
                localVid.play();
            }
        };
    </script>
</body>
</html>
