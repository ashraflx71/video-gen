<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Studio</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 450px; margin: auto; border: 2px solid #D4AF37; padding: 15px; border-radius: 15px; background: #050505; }
        
        /* صندوق النص */
        textarea { width: 100%; height: 60px; font-size: 18px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #D4AF37; border-radius: 8px; padding: 10px; box-sizing: border-box; }

        /* حاوية الفيديو */
        .video-wrap { width: 100%; position: relative; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        video { width: 100%; display: block; background: #000; }
        
        /* النص الذهبي فوق الفيديو */
        #caption { 
            position: absolute; bottom: 10px; left: 0; width: 100%; 
            background: rgba(0,0,0,0.7); color: #D4AF37; 
            padding: 10px 0; font-size: 22px; font-weight: bold; 
            display: none; z-index: 10;
        }

        .btn { background: #D4AF37; color: #000; padding: 18px; width: 100%; font-size: 20px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="margin-top:0;">Creative 2026</h2>
        
        <textarea id="msgInput" oninput="updateLabel()" placeholder="اكتب النص هنا..."></textarea>

        <div class="video-wrap">
            <video id="v" controls playsinline webkit-playsinline></video>
            <div id="caption"></div>
        </div>

        <input type="file" id="f" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('f').click()">📂 اختر فيديو من الاستوديو</button>
        
        <p style="font-size:12px; color:#444; margin-top:10px;">أستاذ أشرف - نسخة التشغيل المضمون</p>
    </div>

    <script>
        const v = document.getElementById('v');
        const f = document.getElementById('f');
        const cap = document.getElementById('caption');
        const inp = document.getElementById('msgInput');

        // أهم جزء: قراءة الملف بشكل مباشر
        f.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    v.src = e.target.result;
                    v.style.display = "block";
                    cap.style.display = "block";
                    v.play(); // محاولة تشغيل
                };
                reader.readAsDataURL(file);
            }
        });

        function updateLabel() {
            cap.innerText = inp.value;
        }
    </script>
</body>
</html>
