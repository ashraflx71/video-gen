<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | محرر الفيديو الاحترافي</title>
    <style>
        /* تصميم أشرف المفضل: أسود وذهبي */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px; /* خط كبير لسهولة القراءة من الهاتف */
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { color: #D4AF37; margin-bottom: 30px; }

        #editor-container {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #D4AF37;
            background: #111;
            line-height: 0;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        input, select {
            width: 90%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #D4AF37;
            background: #222;
            color: #fff;
            font-size: 20px;
        }

        .button {
            background-color: #D4AF37;
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            width: 90%;
            margin-top: 10px;
        }

        .button:active { transform: scale(0.98); }
        
        #videoInfo { margin-top: 20px; color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Creative 2026</h1>

    <div id="editor-container">
        <canvas id="videoCanvas" width="1280" height="720"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="youtubeUrl" placeholder="الصق رابط الفيديو هنا...">
        <button id="fetchBtn" class="button">🔍 جلب ومعالجة الفيديو</button>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <input type="text" id="overlayText" placeholder="اكتب النص الذهبي هنا...">
        <button id="applyTextBtn" class="button">✍️ إضافة النص السينمائي</button>
    </div>

    <div id="videoInfo"></div>
</div>

<script>
    // كود المحرر الذكي
    class VideoEditor {
        constructor() {
            this.canvas = document.getElementById('videoCanvas');
            this.ctx = this.canvas.getContext('2d');
            this.video = document.createElement('video');
            this.video.crossOrigin = "anonymous";
            this.text = "Creative 2026";
            
            this.setupEvents();
            this.draw();
        }

        setupEvents() {
            // زر الجلب (محاكاة للجلب تمهيداً لربط الـ API الخاص بك)
            document.getElementById('fetchBtn').onclick = () => {
                const url = document.getElementById('youtubeUrl').value;
                if(url) {
                    document.getElementById('videoInfo').innerText = "⏳ جاري تهيئة المحرك...";
                    // سنستخدم فيديو تجريبي حالياً للتأكد من عمل المحرر
                    this.loadVideo("https://www.w3schools.com/html/mov_bbb.mp4");
                }
            };

            // زر إضافة النص
            document.getElementById('applyTextBtn').onclick = () => {
                this.text = document.getElementById('overlayText').value;
            };
        }

        loadVideo(url) {
            this.video.src = url;
            this.video.loop = true;
            this.video.play();
            document.getElementById('videoInfo').innerText = "✅ الفيديو جاهز للتعديل";
        }

        draw() {
            // رسم الفيديو
            this.ctx.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);

            // إضافة الفلتر السينمائي (تعتيم خفيف)
            this.ctx.fillStyle = "rgba(0,0,0,0.2)";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            // إضافة النص الذهبي
            if (this.text) {
                this.ctx.font = "bold 60px 'Segoe UI'";
                let gradient = this.ctx.createLinearGradient(0, 400, 0, 720);
                gradient.addColorStop(0, "#D4AF37");
                gradient.addColorStop(1, "#FFD700");

                this.ctx.fillStyle = gradient;
                this.ctx.textAlign = "center";
                this.ctx.shadowColor = "black";
                this.ctx.shadowBlur = 15;
                this.ctx.fillText(this.text, this.canvas.width/2, 650);
            }

            requestAnimationFrame(() => this.draw());
        }
    }

    // تشغيل المحرر عند فتح الصفحة من الهاتف
    window.onload = () => new VideoEditor();
</script>

</body>
</html>
