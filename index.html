<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك فيديو Creative 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="video-preview-wrapper">
            <canvas id="videoCanvas" width="1080" height="1080"></canvas>
        </div>

        <div class="controls-card">
            <h2 class="title">تطوير الفيديو الذكي</h2>
            
            <div class="input-group">
                <label for="videoText">النص المراد تحويله لفيديو:</label>
                <input type="text" id="videoText" placeholder="اكتب هنا..." maxlength="50">
            </div>

            <div class="actions">
                <button id="exportBtn" class="btn-gold">
                    <span class="icon">🎬</span> توليد وتحميل الفيديو
                </button>
            </div>
            
            <p class="status-note">سيتم معالجة الفيديو بجودة عالية (30 إطار/ثانية) مباشرة من متصفحك.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
