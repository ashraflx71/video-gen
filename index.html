<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | محرر الفيديو الذهبي</title>
    <style>
        /* تصميم مريح للعين - أسود وذهبي */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        h1 {
            color: #D4AF37; /* ذهبي */
            font-size: 35px;
            margin-bottom: 20px;
        }

        /* حاوية الفيديو */
        #video-wrapper {
            border: 3px solid #D4AF37;
            background: #111;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 10px;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        /* المدخلات والأزرار بحجم كبير جداً */
        input {
            width: 95%;
            padding: 20px;
            font-size: 22px;
            margin: 10px 0;
            background: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 10px;
        }

        input:focus {
            border-color: #D4AF37;
            outline: none;
        }

        .button {
            width: 95%;
            padding: 22px;
            font-size: 24px;
            font-weight: bold;
            background-color: #D4AF37;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .button-secondary {
            background-color: #333;
            color: #D4AF37;
            border: 1px solid #D4AF37;
        }

        #status-msg {
            font-size: 20px;
            color: #D4AF37;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Creative 2026</h1>

    <div id="video-wrapper">
        <canvas id="mainCanvas" width="1280" height="720"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="videoUrl" https://youtu.be/ac_eyiZp6mc" onclick="startApp()">🔍 جلب ومعالجة الفيديو</button>
      الفيديو</button>
        
        <input type="text" id="userText" placehol
        <button class="button" onclick="startApp()">🔍 جلب ومعالجة الفيديو</button>
        
        <input type="text" id="userText" placeholder="اكتب النص الذهبي الذي سيظهر">
        <button class="button button-secondary" onclick="updateOverlay()">✍️ تحديث النص السينمائي</button>
        
        <button id="saveBtn" class="button" style="background-color: #28a745; color: white; display:none;" onclick="recordVideo()">💾 حفظ الفيديو النهائي</button>
    </div>

    <p id="status-msg">جاهز لبدء مشروعك الجديد...</p>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.createElement('video');
        video.crossOrigin = "anonymous";
        
        let overlayText = "Creative 2026";

        // وظيفة تشغيل التطبيق والجلب
        function startApp() {
            const url = document.getElementById('videoUrl').value;
            const status = document.getElementById('status-msg');

            if (!url) {
                alert("من فضلك ضع رابط الفيديو");
                return;
            }

            status.innerText = "⏳ جاري محاكاة الربط وتجهيز المحرك...";
            
            // رابط فيديو تجريبي ليعمل معك فوراً حتى نربط الـ API
            video.src = "https://www.w3schools.com/html/mov_bbb.mp4";
            video.loop = true;
            video.play();

            video.onplay = () => {
                status.innerText = "✅ الفيديو يعمل! يمكنك إضافة النص وحفظ العمل.";
                document.getElementById('saveBtn').style.display = "block";
                draw();
            };
        }

        // تحديث النص من المدخلات
        function updateOverlay() {
            overlayText = document.getElementById('userText').value || "Creative 2026";
        }

        // عملية الرسم المستمرة (الفيديو + الفلتر + النص)
        function draw() {
            if (!video.paused && !video.ended) {
                // 1. رسم الفيديو
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // 2. إضافة فلتر تعتيم خفيف ليبرز النص
                ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 3. رسم النص الذهبي الفخم
                ctx.font = "bold 70px Arial";
                let goldGrad = ctx.createLinearGradient(0, 500, 0, 700);
                goldGrad.addColorStop(0, "#D4AF37");
                goldGrad.addColorStop(1, "#FFD700");

                ctx.fillStyle = goldGrad;
                ctx.textAlign = "center";
                ctx.shadowColor = "black";
                ctx.shadowBlur = 20;
                ctx.fillText(overlayText, canvas.width / 2, 650);
            }
            requestAnimationFrame(draw);
        }

        // وظيفة تسجيل الفيديو وحفظه على هاتفك
        function recordVideo() {
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'Creative_2026_Pro.webm';
                a.click();
            };

            recorder.start();
            alert("بدأ التسجيل (10 ثوانٍ).. انتظر قليلاً");
            setTimeout(() => recorder.stop(), 10000);
        }
    </script>
</body>
</html>
