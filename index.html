<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Video Gen</title>
    <style>
        /* التنسيق الملكي المباشر */
        body {
            background-color: #000000;
            color: #D4AF37; /* اللون الذهبي */
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            border: 4px solid #D4AF37;
            border-radius: 25px;
            padding: 40px;
            background: #0a0a0a;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-size: 50px; /* خط كبير جداً */
            margin-bottom: 5px;
            text-shadow: 2px 2px #000;
        }

        .brand-name {
            font-size: 24px;
            color: #996515;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* صندوق الفيديو */
        .video-wrapper {
            width: 100%;
            height: 400px;
            background: #000;
            border: 2px solid #D4AF37;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
        }

        /* الأزرار الكبيرة */
        .royal-btn {
            background: #D4AF37;
            color: #000;
            font-size: 28px;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .royal-btn:hover {
            background: #ffffff;
            box-shadow: 0 0 20px #D4AF37;
        }

        .secondary-btn {
            background: transparent;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            font-size: 24px;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CREATIVE 2026</h1>
        <div class="brand-name">أستاذ أشرف - Video Gen Pro</div>

        <div class="video-wrapper">
            <canvas id="mainCanvas"></canvas>
            <p id="infoText">بانتظار رفع ملف الفيديو...</p>
        </div>

        <input type="file" id="uploadFile" accept="video/*" style="display:none">
        <button class="royal-btn" onclick="document.getElementById('uploadFile').click()">📤 ارفع الفيديو الآن</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="secondary-btn" onclick="applyEffect()">✨ فلتر ذهبي</button>
            <button class="secondary-btn" onclick="saveVideo()">💾 حفظ العمل</button>
        </div>

        <div id="status">جاهز للعمل يا أستاذ أشرف..</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('uploadFile');
        const info = document.getElementById('infoText');
        let video = document.createElement('video');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                info.style.display = 'none';
                video.play();
                render();
            };
        };

        function render() {
            if (!video.paused && !video.ended) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // العلامة المائية الفخمة
                ctx.font = "bold 35px Arial";
                ctx.fillStyle = "rgba(214, 175, 55, 0.4)";
                ctx.fillText("Creative 2026", 30, canvas.height - 30);
                
                requestAnimationFrame(render);
            }
        }

        function applyEffect() { alert("تم تفعيل الفلتر الملكي!"); }
        function saveVideo() { alert("جاري تصدير الفيديو..."); }
    </script>
</body>
</html>
