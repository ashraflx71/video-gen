<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Video Gen</title>
    <style>
        /* التنسيق الشرطي لمنع شكل الجريدة */
        body {
            background-color: #000000 !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .main-card {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            border: 3px solid #D4AF37; /* الإطار الذهبي */
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(214, 175, 55, 0.2);
            text-align: center;
        }

        h1 {
            color: #D4AF37;
            font-size: 40px; /* خط كبير جداً ومريح */
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 15px;
        }

        .subtitle {
            color: #996515;
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* منطقة الفيديو - الصندوق الملكي */
        .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #050505;
            border: 1px solid #D4AF37;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }

        /* الأزرار الاحترافية */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            background: #000;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            padding: 20px;
            font-size: 22px; /* خط كبير للأزرار */
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 20px #D4AF37;
        }

        .upload-label {
            background: #D4AF37;
            color: #000;
            padding: 20px;
            display: block;
            border-radius: 12px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* إخفاء المدخلات القبيحة */
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>CREATIVE 2026</h1>
        <div class="subtitle">نظام توليد الفيديوهات الذكي - أستاذ أشرف</div>

        <div class="video-box">
            <canvas id="videoCanvas"></canvas>
            <div id="msg" style="color: #D4AF37; font-size: 24px;">بانتظار الإبداع...</div>
        </div>

        <label for="videoFile" class="upload-label">📥 ارفع الفيديو الآن</label>
        <input type="file" id="videoFile" accept="video/*">

        <div class="btn-group">
            <button onclick="applyGold()">✨ لمسة ذهبية</button>
            <button onclick="download()">💾 حفظ الفيديو</button>
        </div>

        <div style="margin-top: 30px; color: #555; font-size: 18px;">
            حقوق التصميم محفوظة &copy; 2026 Creative Pro
        </div>
    </div>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('videoFile');
        const msg = document.getElementById('msg');
        let video = document.createElement('video');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                msg.style.display = 'none';
                video.play();
                draw();
            };
        };

        function draw() {
            if (!video.paused && !video.ended) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // إضافة العلامة المائية بخط واضح وكبير
                ctx.font = "bold 40px Arial";
                ctx.fillStyle = "rgba(212, 175, 55, 0.5)";
                ctx.fillText("Creative 2026", 40, canvas.height - 40);
                
                requestAnimationFrame(draw);
            }
        }

        function applyGold() {
            alert("أستاذ أشرف، تم تفعيل الفلتر الملكي بنجاح!");
        }

        function download() {
            alert("جاري تحضير ملف MP4 عالي الجودة...");
        }
    </script>
</body>
</html>
