<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Studio</title>
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background: #000; color: var(--gold); font-family: Arial; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .main-card { width: 100%; max-width: 600px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; background: var(--black); position: relative; }
        
        /* مكان النص */
        textarea { width: 100%; height: 120px; background: #111; color: #fff; border: 1px solid var(--gold); border-radius: 10px; font-size: 20px; padding: 10px; box-sizing: border-box; }

        /* شاشة الفيديو */
        .preview { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #333; margin: 15px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 10px; }
        canvas { width: 100%; height: 100%; }

        /* الأزرار */
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        .btn-out { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        /* --- علامة التحميل (Loader) --- */
        .loader-overlay {
            display: none; /* مخفي افتراضياً */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10;
            flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="loaderOverlay" class="loader-overlay">
            <div class="spinner"></div>
            <p id="loaderMsg" style="margin-top:15px; font-weight:bold;">جاري المعالجة...</p>
        </div>

        <h1 style="text-align:center; margin:0 0 15px 0;">CREATIVE 2026</h1>
        
        <textarea id="scriptInput" placeholder="اكتب نص الفيديو هنا..."></textarea>

        <div class="preview">
            <canvas id="c"></canvas>
            <div id="pText" style="position:absolute;">المعاينة</div>
        </div>

        <input type="file" id="up" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('up').click()">📲 رفع فيديو</button>
        
        <button class="btn btn-out" onclick="showLoading('جاري توليد الذكاء...')">🎬 توليد بالذكاء</button>
        <button class="btn btn-out" onclick="showLoading('جاري حفظ الفيديو...')">💾 حفظ النهائي</button>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const up = document.getElementById('up');
        let video = document.createElement('video');

        up.onchange = (e) => {
            const file = e.target.files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('pText').style.display = 'none';
                video.play();
                draw();
            };
        };

        function draw() {
            if (!video.paused && !video.ended) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.font = "25px Arial";
                ctx.fillStyle = "rgba(212,175,55,0.5)";
                ctx.fillText("Creative 2026", 20, canvas.height - 20);
                requestAnimationFrame(draw);
            }
        }

        // دالة إظهار التحميل
        function showLoading(msg) {
            const overlay = document.getElementById('loaderOverlay');
            document.getElementById('loaderMsg').innerText = msg;
            overlay.style.display = 'flex';
            
            // محاكاة انتهاء العملية بعد 3 ثواني
            setTimeout(() => {
                overlay.style.display = 'none';
                alert("اكتملت العملية بنجاح!");
            }, 3000);
        }
    </script>
</body>
</html>
