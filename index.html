<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | ساهل</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: var(--gold); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        /* تصميم ساهل ومنجز */
        .container { max-width: 480px; margin: auto; }
        
        /* شريط البحث الذكي */
        .search-row { display: flex; gap: 5px; margin-bottom: 15px; }
        input, textarea { 
            width: 100%; background: #111; border: 1px solid #333; 
            color: #fff; padding: 12px; border-radius: 10px; outline: none; font-size: 16px;
        }
        input:focus, textarea:focus { border-color: var(--gold); }

        /* منطقة العرض */
        .preview { 
            width: 100%; aspect-ratio: 16/9; background: #080808; 
            border-radius: 15px; position: relative; overflow: hidden; border: 1px solid #222;
        }
        iframe, video { width: 100%; height: 100%; border: none; display: none; }
        
        /* النص الذهبي السهل */
        #txtOverlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.8); color: var(--gold); padding: 10px 0; 
            font-size: 20px; font-weight: bold; display: none; pointer-events: none;
        }

        /* الأزرار */
        .btn { 
            background: var(--gold); color: #000; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="letter-spacing: 2px;">CREATIVE 2026</h2>

        <div class="search-row">
            <input type="text" id="link" placeholder="ضع رابط يوتيوب أو Shorts هنا...">
            <button class="btn" style="width: 80px; margin:0;" onclick="load()">جلب</button>
        </div>

        <textarea id="words" placeholder="اكتب النص اللي هيظهر هنا..." oninput="sync()"></textarea>

        <div class="preview" id="box">
            <iframe id="yt"></iframe>
            <video id="vid" controls playsinline></video>
            <div id="txtOverlay"></div>
            <p id="hint" style="margin-top: 15%; color: #444;">المعاينة هنا</p>
        </div>

        <button class="btn" onclick="document.getElementById('file').click()">📲 ارفع فيديو محلي</button>
        <input type="file" id="file" hidden accept="video/*">
        
        <p style="font-size: 12px; color: #333; margin-top: 20px;">تصميم: أشرف حسن علي</p>
    </div>

    <script>
        const yt = document.getElementById('yt');
        const vid = document.getElementById('vid');
        const overlay = document.getElementById('txtOverlay');
        const hint = document.getElementById('hint');

        // دالة الجلب الذكية (تدعم Shorts)
        function load() {
            const url = document.getElementById('link').value;
            const id = url.match(/(?:shorts\/|v=|\/vi\/|youtu\.be\/|\/embed\/)([a-zA-Z0-9_-]{11})/);
            
            if (id && id[1]) {
                vid.style.display = "none";
                yt.src = `https://www.youtube.com/embed/${id[1]}?autoplay=1`;
                yt.style.display = "block";
                hint.style.display = "none";
                overlay.style.display = "block";
            } else {
                alert("الرابط مش مظبوط يا هندسة!");
            }
        }

        // تحديث النص لحظياً
        function sync() {
            overlay.innerText = document.getElementById('words').value;
            if (overlay.innerText) overlay.style.display = "block";
        }

        // الرفع المحلي
        document.getElementById('file').onchange = function(e) {
            if (e.target.files[0]) {
                yt.style.display = "none";
                vid.src = URL.createObjectURL(e.target.files[0]);
                vid.style.display = "block";
                hint.style.display = "none";
                overlay.style.display = "block";
                vid.play();
            }
        };
    </script>
</body>
</html>
