<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مولد الفيديوهات الاحترافي</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Video Generator">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons for iOS -->
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🎬 مولد الفيديوهات</h1>
            <button id="installBtn" class="install-btn" style="display: none;">تثبيت التطبيق</button>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Input Section -->
            <section class="input-section">
                <h2>إعدادات الفيديو</h2><!-- YouTube Download Section -->
<section class="youtube-section">
    <h2>📥 تحميل من YouTube</h2>
    
    <div class="form-group">
        <label for="youtubeUrl">رابط الفيديو:</label>
        <div class="youtube-input-group">
            <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
            <button id="fetchVideoBtn" class="btn btn-secondary">🔍 جلب الفيديو</button>
        </div>
    </div>
    
    <!-- Video Info Preview -->
    <div id="videoInfo" class="video-info" style="display: none;">
        <div class="video-thumbnail">
            <img id="videoThumbnail" src="" alt="Video thumbnail">
        </div>
        <div class="video-details">
            <h4 id="videoTitle"></h4>
            <p id="videoDuration"></p>
            <p id="videoAuthor"></p>
        </div>
    </div>
    
    <!-- Download Options -->
    <div id="downloadOptions" class="download-options" style="display: none;">
        <h4>خيارات التحميل:</h4>
        
        <div class="form-row">
            <div class="form-group">
                <label for="videoQuality">الجودة:</label>
                <select id="videoQuality">
                    <option value="1080p">1080p (Full HD)</option>
                    <option value="720p" selected>720p (HD)</option>
                    <option value="480p">480p (SD)</option>
                    <option value="360p">360p</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="videoFormat">الصيغة:</label>
                <select id="videoFormat">
                    <option value="mp4">MP4</option>
                    <option value="webm">WebM</option>
                    <option value="audio">🎵 صوت فقط (MP3)</option>
                </select>
            </div>
        </div>
        
        <div class="button-group">
            <button id="downloadVideoBtn" class="btn btn-primary">⬇️ تحميل الفيديو</button>
            <button id="useInEditorBtn" class="btn btn-secondary">🎬 استخدام في المحرر</button>
        </div>
    </div>
    
    <!-- Progress Bar for YouTube -->
    <div class="progress-container" id="youtubeProgress" style="display: none;">
        <div class="progress-bar" id="youtubeProgressBar"></div>
        <span id="youtubeProgressText">0%</span>
    </div>
</section>
                
                <div class="form-group">
                    <label for="videoWidth">العرض (px):</label>
                    <input type="number" id="videoWidth" value="1280" min="320" max="3840">
                </div>
                
                <div class="form-group">
                    <label for="videoHeight">الارتفاع (px):</label>
                    <input type="number" id="videoHeight" value="720" min="240" max="2160">
                </div>
                
                <div class="form-group">
                    <label for="fps">عدد الإطارات في الثانية:</label>
                    <input type="number" id="fps" value="30" min="15" max="60">
                </div>
                
                <div class="form-group">
                    <label for="duration">مدة الفيديو (ثواني):</label>
                    <input type="number" id="duration" value="5" min="1" max="30">
                </div>
            </section>

            <!-- Text Overlay Section -->
            <section class="text-section">
                <h3>إضافة نص</h3>
                <div class="form-group">
                    <input type="text" id="textInput" placeholder="أدخل النص الذي تريد ظهوره">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="fontSize">حجم الخط:</label>
                        <input type="number" id="fontSize" value="48" min="12" max="200">
                    </div>
                    
                    <div class="form-group">
                        <label for="textColor">اللون:</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="bgColor">لون الخلفية:</label>
                        <input type="color" id="bgColor" value="#4a90e2">
                    </div>
                    
                    <div class="form-group">
                        <label for="animationType">نوع الحركة:</label>
                        <select id="animationType">
                            <option value="none">بدون حركة</option>
                            <option value="slide" selected>انزلاق</option>
                            <option value="fade">تلاشي</option>
                            <option value="bounce">ارتداد</option>
                            <option value="rotate">دوران</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Canvas Preview -->
            <section class="preview-section">
                <h3>معاينة حية</h3>
                <canvas id="previewCanvas"></canvas>
            </section>

            <!-- Controls -->
            <section class="controls-section">
                <button id="generateBtn" class="btn btn-primary">
                    🎥 إنشاء الفيديو
                </button>
                
                <button id="previewBtn" class="btn btn-secondary">
                    👁️ معاينة
                </button>
                
                <button id="downloadBtn" class="btn btn-success" disabled>
                    ⬇️ تحميل الفيديو
                </button>
            </section>

            <!-- Progress Bar -->
            <div class="progress-container" style="display: none;">
                <div class="progress-bar" id="progressBar"></div>
                <span id="progressText">0%</span>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/canvas-editor.js"></script>
    <script src="js/video-generator.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
