<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Official Studio</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; --bg: #0a0a0a; }
        body { background: var(--black); color: var(--gold); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .main-card { width: 100%; max-width: 700px; border: 3px solid var(--gold); border-radius: 25px; padding: 25px; background: var(--bg); position: relative; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }
        
        h1 { text-align: center; font-size: 40px; margin: 0 0 20px 0; text-shadow: 2px 2px #000; letter-spacing: 2px; }

        /* منطقة النص الكبيرة */
        textarea { width: 100%; height: 130px; background: #111; color: #fff; border: 2px solid var(--gold); border-radius: 15px; font-size: 24px; padding: 15px; box-sizing: border-box; margin-bottom: 20px; outline: none; }

        /* حاوية الفيديو الذكية */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--gold); border-radius: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100%; height: 100%; object-fit: cover; }

        /* أزرار الهاتف الملكية */
        .btn { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-size: 26px; font-weight: bold; border-radius: 15px; cursor: pointer; margin-bottom: 12px; transition: 0.3s; }
        .btn-out { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
        .btn:active { transform: scale(0.95); }

        /* شاشة التحميل الذهبية */
        #loader {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 70px; height: 70px; border: 5px solid #222; border-top: 5px solid var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 22px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="loader">
            <div class="spinner"></div>
            <p class="loading-text" id="loaderMsg">جاري تشغيل محرك الإبداع...</p>
        </div>

        <h1>CREATIVE 2026</h1>
        
        <textarea id="userInput" placeholder="اكتب نص الفيديو هنا (مثلاً: إتيكيت المصافحة الراقي)..."></textarea>

        <div class="video-box">
            <canvas id="studioCanvas"></canvas>
            <div id="hint" style="position:absolute; font-size:22px; color:#555;">المعاينة الرسمية</div>
        </div>

        <br>
        <input type="file" id="phoneFile" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('phoneFile').click()">📲 اختيار فيديو من هاتفك</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-out" onclick="runProcess('جاري دمج النص والذكاء...')">🎬 توليد نهائي</button>
            <button class="btn btn-out" style="background:var(--gold); color:#000;" onclick="runProcess('جاري حفظ الملف الملكي...')">💾 حفظ الفيديو</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('studioCanvas');
        const ctx = canvas.getContext('2d');
        const phoneFile = document.getElementById('phoneFile');
        const userInput = document.getElementById('userInput');
        let video = document.createElement('video');

        phoneFile.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    document.getElementById('hint').style.display = 'none';
                    video.play();
                    render();
                };
            }
        };

        function render() {
            if (!video.paused && !video.ended) {
                // رسم الفيديو
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 1. إضافة العلامة المائية الثابتة
                ctx.font = "bold 30px Arial";
                ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
                ctx.fillText("Creative 2026", 30, 50);

                // 2. إضافة النص الذي يكتبه الأستاذ أشرف (Subtitles)
                const text = userInput.value;
                if (text) {
                    ctx.font = "bold 40px Arial";
                    ctx.textAlign = "center";
                    // خلفية سوداء خفيفة للنص لسهولة القراءة
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
                    // النص الذهبي
                    ctx.fillStyle = "#D4AF37";
                    ctx.fillText(text, canvas.width / 2, canvas.height - 40);
                }
                
                requestAnimationFrame(render);
            }
        }

        function runProcess(msg) {
            const loader = document.getElementById('loader');
            document.getElementById('loaderMsg').innerText = msg;
            loader.style.display = 'flex';
            
            setTimeout(() => {
                loader.style.display = 'none';
                alert("أستاذ أشرف، تم التشغيل بنجاح وبأعلى جودة!");
            }, 3500);
        }
    </script>
</body>
</html>
