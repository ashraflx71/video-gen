<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Studio Pro</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #000000;
            --dark-gray: #111111;
        }

        body {
            background-color: var(--black);
            color: var(--gold);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .studio-card {
            width: 100%;
            max-width: 900px;
            background: var(--dark-gray);
            border: 3px solid var(--gold);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        h1 { font-size: 45px; text-align: center; margin-bottom: 20px; text-shadow: 2px 2px #000; }

        /* منطقة النص الكبيرة */
        .text-input-area {
            width: 100%;
            height: 150px;
            background: #000;
            color: #fff;
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 15px;
            font-size: 22px; /* خط كبير ومريح */
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
        }

        /* منطقة المعاينة */
        .preview-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #050505;
            border: 2px dashed var(--gold);
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas { width: 100%; height: 100%; border-radius: 12px; }

        /* أزرار الهاتف الكبيرة */
        .action-btn {
            background: var(--gold);
            color: #000;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border: none;
            border-radius: 15px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* قسم المكتبة الصوتية */
        .audio-library {
            background: #0a0a0a;
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .audio-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .audio-item:last-child { border-bottom: none; }

        .audio-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="studio-card">
        <h1>CREATIVE 2026</h1>

        <textarea class="text-input-area" id="videoText" placeholder="اكتب السيناريو أو نص الإتيكيت هنا..."></textarea>

        <div class="preview-box">
            <canvas id="mainCanvas"></canvas>
            <p id="placeholder" style="position:absolute; font-size:20px;">شاشة المعاينة</p>
        </div>

        <input type="file" id="mobileUpload" accept="video/*,image/*" style="display:none">
        <button class="action-btn" onclick="document.getElementById('mobileUpload').click()">
            📲 رفع من الهاتف (فيديو/صور)
        </button>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="action-btn" style="background:transparent; color:var(--gold); border:2px solid var(--gold);" onclick="generateAI()">🎬 توليد بالذكاء</button>
            <button class="action-btn" onclick="downloadFinal()">💾 حفظ النهائي</button>
        </div>

        <div class="audio-library">
            <h3 style="margin-top:0;">🎵 المكتبة الصوتية</h3>
            <div class="audio-item">
                <span>تعليق صوتي فخم (رجل)</span>
                <button class="audio-btn" onclick="playAudio('m1')">🔊 تجربة</button>
            </div>
            <div class="audio-item">
                <span>تعليق صوتي هادئ (امرأة)</span>
                <button class="audio-btn" onclick="playAudio('w1')">🔊 تجربة</button>
            </div>
            <input type="file" id="audioUpload" accept="audio/*" style="display:none">
            <button onclick="document.getElementById('audioUpload').click()" style="width:100%; background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">+ إضافة صوت خارجي</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const upload = document.getElementById('mobileUpload');
        let video = document.createElement('video');

        upload.onchange = (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            video.src = url;
            video.play();
            document.getElementById('placeholder').style.display = 'none';
            render();
        };

        function render() {
            if (!video.paused && !video.ended) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // العلامة المائية الفخمة
                ctx.font = "bold 30px Arial";
                ctx.fillStyle = "rgba(214, 175, 55, 0.5)";
                ctx.fillText("Creative 2026", 20, canvas.height - 20);
                
                requestAnimationFrame(render);
            }
        }

        function generateAI() { alert("جاري ربط النص بالمحرك الصوتي والبصري..."); }
        function downloadFinal() { alert("جاري تصدير الفيديو بجودة عالية..."); }
        function playAudio(type) { alert("تشغيل عينة الصوت: " + type); }
    </script>
</body>
</html>
