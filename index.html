<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | تنسيق النصوص الذهبية</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        h1 { color: #D4AF37; font-size: 30px; margin-bottom: 15px; }

        #canvas-container {
            border: 2px solid #D4AF37;
            background: #111;
            margin: 0 auto 20px;
            max-width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas { width: 100%; height: auto; display: block; }

        /* منطقة إدخال النص - جعلناها TextArea لتكتب عدة أسطر */
        textarea {
            width: 95%;
            height: 120px;
            padding: 15px;
            font-size: 20px;
            background: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .button {
            width: 95%;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            background-color: #D4AF37;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
        }

        #status { color: #D4AF37; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Creative 2026</h1>

    <div id="canvas-container">
        <canvas id="mainCanvas" width="1280" height="720"></canvas>
    </div>

    <div class="controls">
        <textarea id="userText" placeholder="اكتب هنا.. اضغط Enter لسطر جديد"></textarea>
        
        <input type="text" id="bgUrl" placeholder="رابط الخلفية الذهبية (صورة)">
        <button class="button" onclick="applyChanges()">✨ تحديث وتنسيق النص</button>
        
        <button id="saveBtn" class="button" style="background-color: #28a745; color: white; display:none;" onclick="startRecording()">💾 حفظ الفيديو المنسق</button>
    </div>

    <p id="status">جاهز لتنسيق إبداعك...</p>

    <script>// وظيفة تفعيل الاشتراك الكامل
function activateFullVersion() {
    // إعادة تعيين العداد ليكون -1 (رمز للاشتراك المفتوح)
    localStorage.setItem('creative2026_count', -1);
    
    // إظهار رسالة ترحيب فخمة بخط كبير
    const status = document.getElementById('status');
    status.innerHTML = `
        <div style="border: 2px solid #D4AF37; padding: 20px; background: #000; border-radius: 15px;">
            <h2 style="color: #D4AF37; font-size: 30px;">مرحباً بك في النادي الذهبي 👑</h2>
            <p style="font-size: 22px;">تم تفعيل اشتراكك بنجاح. يمكنك الآن استخراج فيديوهات غير محدودة بجودة فائقة.</p>
            <button class="button" onclick="location.reload()">ابدأ الإبداع الآن</button>
        </div>
    `;
    
    // إخفاء لوحة الاشتراك وإعادة زر الحفظ
    document.getElementById('subscription-panel').style.display = 'none';
    document.getElementById('saveBtn').style.display = 'block';
}

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.crossOrigin = "anonymous";

        function applyChanges() {
            const url = document.getElementById('bgUrl').value;
            if (url) {
                bgImg.src = url;
                bgImg.onload = () => {
                    document.getElementById('saveBtn').style.display = "block";
                    render();
                };
            } else {
                render(); // رسم النص حتى بدون خلفية للتجربة
            }
        }

        function render() {
            // 1. مسح الرسم القديم ورسم الخلفية
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (bgImg.complete && bgImg.src) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            }

            // 2. إعدادات النص الذهبي
            ctx.font = "bold 65px Arial";
            ctx.textAlign = "center";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 20;

            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0.4, "#D4AF37");
            gradient.addColorStop(0.6, "#FFD700");
            ctx.fillStyle = gradient;

            // 3. تقسيم النص لأسطر (التنسيق الذكي)
            const text = document.getElementById('userText').value || "Creative\n2026";
            const lines = text.split('\n'); // تقسيم النص عند كل Enter
            const lineHeight = 80; // المسافة بين الأسطر
            
            // حساب نقطة البداية ليكون النص في المنتصف تماماً
            const totalHeight = lines.length * lineHeight;
            let y = (canvas.height - totalHeight) / 2 + 50;

            lines.forEach(line => {
                ctx.fillText(line, canvas.width / 2, y);
                y += lineHeight;
            });

            requestAnimationFrame(render);
        }

        function startRecording() {
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'Formatted_Video.webm';
                a.click();
            };
            recorder.start();
            alert("بدأ تسجيل الفيديو المنسق.. انتظر 10 ثوانٍ");
            setTimeout(() => recorder.stop(), 10000);
        }
    </script>
</body>
</html>
