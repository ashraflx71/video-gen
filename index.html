<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creative 2026 | Official Studio</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { 
            background: var(--black); color: var(--gold); 
            font-family: 'Arial', sans-serif; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .main-card { 
            width: 100%; max-width: 500px; border: 3px solid var(--gold); 
            border-radius: 20px; padding: 15px; background: #0a0a0a; 
            box-sizing: border-box; box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }

        h1 { font-size: 28px; text-align: center; margin: 10px 0; text-shadow: 1px 1px #000; }

        /* منطقة النص - كبيرة جداً وواضحة */
        textarea { 
            width: 100%; height: 100px; background: #111; color: #fff; 
            border: 1px solid var(--gold); border-radius: 12px; font-size: 22px; 
            padding: 12px; box-sizing: border-box; margin-bottom: 15px; text-align: right;
        }

        /* حاوية الفيديو المضمونة */
        #videoContainer {
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border-radius: 12px; position: relative; overflow: hidden;
            border: 1px solid #333; display: flex; justify-content: center; align-items: center;
        }

        video { width: 100%; height: 100%; display: none; object-fit: contain; }

        /* طبقة المعلومات فوق الفيديو */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; flex-direction: column;
            justify-content: space-between; padding: 15px; box-sizing: border-box;
        }

        .watermark { font-size: 18px; opacity: 0.6; font-weight: bold; text-align: left; }
        
        #subDisplay { 
            background: rgba(0,0,0,0.7); color: var(--gold); 
            padding: 12px; border-radius: 10px; font-size: 24px; 
            font-weight: bold; text-align: center; border: 1px solid var(--gold);
        }

        /* الأزرار الكبيرة جداً للموبايل */
        .btn { 
            background: var(--gold); color: #000; border: none; padding: 20px; 
            width: 100%; font-size: 24px; font-weight: bold; border-radius: 15px; 
            margin-top: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-secondary { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>CREATIVE 2026</h1>

        <textarea id="textIn" oninput="syncText()" placeholder="اكتب نص الفيديو هنا..."></textarea>

        <div id="videoContainer">
            <video id="myVideo" playsinline webkit-playsinline muted loop></video>
            <div id="status">بانتظار فيديو الهاتف...</div>
            
            <div id="overlay">
                <div class="watermark">Creative 2026</div>
                <div id="subDisplay"></div>
            </div>
        </div>

        <input type="file" id="fileIn" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('fileIn').click()">📲 اختر فيديو من الاستوديو</button>
        
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="alert('جاري التوليد...')">🎬 توليد</button>
            <button class="btn btn-secondary" style="background:var(--gold); color:#000;" onclick="alert('جاري الحفظ...')">💾 حفظ</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const fileIn = document.getElementById('fileIn');
        const overlay = document.getElementById('overlay');
        const subDisplay = document.getElementById('subDisplay');
        const textIn = document.getElementById('textIn');
        const status = document.getElementById('status');

        fileIn.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                
                // التأكد من التشغيل بقوة
                video.style.display = "block";
                status.style.display = "none";
                overlay.style.display = "flex";
                
                video.load();
                video.play().catch(function(error) {
                    console.log("التشغيل التلقائي يحتاج لمسة");
                    video.muted = true;
                    video.play();
                });
                syncText();
            }
        };

        function syncText() {
            const val = textIn.value;
            if (val.trim() !== "") {
                subDisplay.innerText = val;
                subDisplay.style.visibility = "visible";
            } else {
                subDisplay.style.visibility = "hidden";
            }
        }
    </script>
</body>
</html>
