<div style="background-color: #000; color: #FFD700; padding: 20px; border: 2px solid #FFD700; border-radius: 15px; text-align: center; font-family: Arial, sans-serif;">
    <h2 style="color: #FFD700;">صانع فيديوهات قناة أشرف حسن</h2>
    <p style="color: #fff;">أدخل نص المقال لتحويله لمقطع Shorts احترافي</p>
    
    <textarea id="articleText" placeholder="اكتب نص المقال هنا..." style="width: 90%; height: 120px; padding: 10px; border-radius: 8px; border: 1px solid #FFD700; background: #111; color: #fff; text-align: right;"></textarea>
    <br><br>
    
    <button onclick="uploadAndCreate()" style="background: linear-gradient(45deg, #FFD700, #b8860b); color: #000; padding: 12px 30px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px;">
        توليد فيديو القناة الآن
    </button>

    <div id="status" style="margin-top: 15px; color: #00ff00; display: none;">جاري المعالجة...</div>
    
    <div id="videoPreview" style="margin-top: 25px;"></div>
</div>

<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

<script>
// ضع بياناتك هنا من لوحة تحكم Cloudinary
const cloudName = "ضع_هنا_Cloud_Name"; 
const apiKey = "ضع_هنا_API_Key";

function uploadAndCreate() {
    const text = document.getElementById('articleText').value;
    const status = document.getElementById('status');
    const preview = document.getElementById('videoPreview');

    if(!text) { alert("برجاء إدخال نص المقال"); return; }
    
    status.style.display = 'block';
    
    // هذا الرابط يستخدم تقنية التحويل المباشر (Transformation) 
    // ليقوم بكتابة النص فوق فيديو خلفية موجود في حسابك
    // سنفترض أن لديك فيديو باسم "background_video"
    
    const transformedUrl = `https://res.cloudinary.com/${cloudName}/video/upload/c_fill,g_center,h_1920,w_1080/l_text:Arial_60_bold_center:${encodeURIComponent(text)},color_white,g_center/background_video.mp4`;

    preview.innerHTML = `
        <p style="color: #fff;">تم تجهيز فيديو القناة!</p>
        <video controls style="width: 100%; max-width: 300px; border: 2px solid #FFD700; border-radius: 10px;">
            <source src="${transformedUrl}" type="video/mp4">
        </video>
        <br><br>
        <a href="${transformedUrl}" target="_blank" style="display: inline-block; background: #FFD700; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">تحميل الفيديو لليوتيوب</a>
    `;
    
    status.style.display = 'none';
}
</script>
