<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 AI | أشرف حسن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Tajawal', sans-serif; text-align: center; padding: 20px; font-size: 22px; }
        .card { border: 2px solid #0000ff; border-radius: 15px; padding: 30px; background: #121212; max-width: 500px; margin: auto; box-shadow: 0 0 20px rgba(0,0,255,0.3); }
        .status { background: #000; color: #00ff00; padding: 15px; border-radius: 8px; margin: 20px 0; font-family: monospace; border: 1px solid #333; }
        .btn { background: #0000ff; color: #fff; padding: 15px; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color: #0000ff;">Creative 2026 AI</h1>
    <p>نظام التوليد المباشر - أشرف حسن</p>
    
    <div class="status" id="display">> جاهز للعمل...</div>
    
    <button class="btn" onclick="startAction()">ابدأ التشغيل الآن</button>
</div>

<script>
function startAction() {
    const display = document.getElementById('display');
    display.innerText = "> جاري الاتصال بمحرك 2026...";
    display.style.color = "#00ff00";

    setTimeout(() => {
        display.innerText = "> تم تفعيل المحرك بنجاح!";
        alert("أهلاً بك يا أشرف! المحرك الآن متصل بمدونتك وجاهز لتلقي الأوامر بدون أخطاء أمان.");
    }, 1500);
}
</script>

</body>
</html>
