<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Video Gen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --black: #0a0a0a;
            --gray: #1a1a1a;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--black);
            color: var(--text-white);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية التصميم الملكي */
        .main-container {
            width: 95%;
            max-width: 1000px;
            margin: 20px auto;
            border: 2px solid var(--gold);
            border-radius: 20px;
            background: linear-gradient(145deg, #111, #000);
            padding: 30px;
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.15);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--gold);
            font-size: 36px; /* خط كبير للفخامة */
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* منطقة العرض والمعالجة */
        .video-display-area {
            width: 100%;
            background: #000;
            border: 1px solid var(--dark-gold);
            border-radius: 15px;
            aspect-ratio: 16 / 9;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* أدوات التحكم */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background: var(--gold);
            color: var(--black);
            box-shadow: 0 0 20px var(--gold);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--black);
        }

        /* قسم الإتيكيت الجديد */
        .etiquette-section {
            background: var(--gray);
            border: 1px dashed var(--gold);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .etiquette-section h2 {
            color: var(--gold);
            font-size: 24px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--dark-gold);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        footer {
            margin-top: 40px;
            color: var(--dark-gold);
            font-size: 14px;
            text-align: center;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>CREATIVE 2026</h1>
        <p style="color: #888;">AI VIDEO GENERATOR & ETIQUETTE ENGINE</p>
    </header>

    <div class="video-display-area">
        <canvas id="mainCanvas"></canvas>
        <div id="placeholderText" style="position:absolute; color: var(--dark-gold);">انتظار رفع الفيديو أو توليد المشهد...</div>
    </div>

    <div class="controls-grid">
        <button class="btn-primary" onclick="document.getElementById('videoFile').click()">
            <span>📂</span> رفع فيديو المصدر
        </button>
        <button onclick="applyRoyalFilter()">
            <span>✨</span> تطبيق الفلتر الملكي
        </button>
        <button onclick="startProcessing()">
            <span>⚙️</span> بدء المعالجة الذكية
        </button>
        <button onclick="downloadVideo()">
            <span>💾</span> حفظ الفيديو النهائي
        </button>
    </div>

    <div class="etiquette-section">
        <h2>🪄 محرك تصحيح الإتيكيت</h2>
        <div class="input-group">
            <input type="text" id="wrongAction" placeholder="اكتب السلوك الخاطئ (مثلاً: النفخ في الطعام)...">
        </div>
        <div class="input-group">
            <input type="text" id="rightAction" placeholder="اكتب السلوك الصحيح (الراقي)...">
        </div>
        <button onclick="generateEtiquetteScene()" style="width: 100%; border-style: solid;">
            توليد فيديو "إتيكيت غلط"
        </button>
    </div>

    <input type="file" id="videoFile" hidden accept="video/*">
</div>

<footer>
    &copy; 2026 Creative Pro - جميع الحقوق محفوظة للأستاذ أشرف
</footer>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const videoFile = document.getElementById('videoFile');
    const placeholder = document.getElementById('placeholderText');
    let video = document.createElement('video');

    videoFile.onchange = function(e) {
        const file = e.target.files[0];
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            placeholder.style.display = 'none';
            video.play();
            updateCanvas();
        };
    };

    function updateCanvas() {
        if (!video.paused && !video.ended) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // إضافة العلامة المائية الفخمة
            ctx.font = "bold 30px Cairo";
            ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
            ctx.fillText("CREATIVE 2026", 30, canvas.height - 30);
            
            requestAnimationFrame(updateCanvas);
        }
    }

    function applyRoyalFilter() {
        alert("تم تفعيل المعالج الذهبي لزيادة حدة التفاصيل وفخامة الألوان.");
    }

    function generateEtiquetteScene() {
        const wrong = document.getElementById('wrongAction').value;
        const right = document.getElementById('rightAction').value;
        
        if(!wrong || !right) {
            alert("أستاذ أشرف، يرجى كتابة السلوك الخطأ والصح أولاً.");
            return;
        }

        alert("جاري إرسال الطلب لـ Video-Gen لإنتاج مشهد مقارنة بين:\n1- " + wrong + "\n2- " + right);
        // هنا يتم الربط مع الـ API الخاص بك
    }

    function startProcessing() {
        alert("بدء عملية الـ Rendering الذكية...");
    }

    function downloadVideo() {
        alert("جاري تحضير ملف MP4 للتحميل...");
    }
</script>

</body>
</html>
