<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Studio Pro</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --gray: #1a1a1a;
        }

        body {
            background-color: var(--black);
            color: var(--gold);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-card {
            width: 100%;
            max-width: 800px;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        h1 { font-size: 35px; text-align: center; margin: 0 0 20px 0; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }

        /* --- 1. مكان كتابة النص (واضح جداً في الأعلى) --- */
        .input-section {
            margin-bottom: 25px;
        }
        
        label { display: block; font-size: 22px; margin-bottom: 10px; font-weight: bold; }

        .text-input {
            width: 100%;
            height: 180px; /* طول مناسب للكتابة المريحة */
            background: #111;
            color: #fff;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            font-size: 24px; /* خط كبير جداً لمقاس عينك */
            box-sizing: border-box;
            resize: vertical;
            display: block; /* لضمان الظهور */
        }

        /* --- 2. منطقة المعاينة --- */
        .preview-area {
            width: 100%;
            aspect-ratio: 16/9;
            background: #050505;
            border: 1px solid var(--gold);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas { width: 100%; height: 100%; }

        /* --- 3. أزرار الهاتف --- */
        .btn-large {
            background: var(--gold);
            color: #000;
            font-size: 26px;
            font-weight: bold;
            padding: 20px;
            width: 100%;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 15px;
            display: block;
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            font-size: 22px;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
        }

        /* --- 4. المكتبة الصوتية --- */
        .audio-box {
            background: var(--gray);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .audio-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>CREATIVE 2026</h1>

        <div class="input-section">
            <label>📝 اكتب نص الفيديو أو السيناريو:</label>
            <textarea id="scriptInput" class="text-input" placeholder="اكتب هنا مثلاً: إتيكيت شرب القهوة..."></textarea>
        </div>

        <div class="preview-area">
            <canvas id="studioCanvas"></canvas>
            <div id="msg" style="position:absolute;">شاشة المعاينة الذكية</div>
        </div>

        <input type="file" id="phonePick" accept="video/*" style="display:none">
        <button class="btn-large" onclick="document.getElementById('phonePick').click()">📲 رفع فيديو من الهاتف</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-outline" onclick="startAI()">🎬 توليد الذكاء</button>
            <button class="btn-outline" style="background:var(--gold); color:#000;" onclick="saveFinal()">💾 حفظ النهائي</button>
        </div>

        <div class="audio-box">
            <h3 style="margin:0;">🎵 المكتبة الصوتية</h3>
            <div class="audio-row">
                <span>تعليق ملكي (فخم)</span>
                <button class="btn-outline" style="width:auto; padding:5px 15px;" onclick="playVoice('v1')">🔊 تجربة</button>
            </div>
            <div class="audio-row">
                <span>تعليق هادئ (راقي)</span>
                <button class="btn-outline" style="width:auto; padding:5px 15px;" onclick="playVoice('v2')">🔊 تجربة</button>
            </div>
            <input type="file" id="audioFile" accept="audio/*" style="display:none">
            <button onclick="document.getElementById('audioFile').click()" style="width:100%; background:none; color:#888; border:none; padding-top:10px; cursor:pointer;">+ إضافة صوت مخصص</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('studioCanvas');
        const ctx = canvas.getContext('2d');
        const picker = document.getElementById('phonePick');
        let video = document.createElement('video');

        picker.onchange = (e) => {
            const file = e.target.files[0];
            video.src = URL.createObjectURL(file);
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById('msg').style.display = 'none';
                video.play();
                update();
            };
        };

        function update() {
            if (!video.paused && !video.ended) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                // العلامة المائية
                ctx.font = "bold 30px Arial";
                ctx.fillStyle = "rgba(214, 175, 55, 0.5)";
                ctx.fillText("Creative 2026", 20, canvas.height - 20);
                requestAnimationFrame(update);
            }
        }

        function startAI() {
            const text = document.getElementById('scriptInput').value;
            if(!text) { alert("أستاذ أشرف، من فضلك اكتب النص أولاً!"); return; }
            alert("جاري دمج النص مع الفيديو...");
        }

        function saveFinal() { alert("جاري تصدير الفيديو وحفظه..."); }
        function playVoice(v) { alert("تجربة عينة الصوت المختارة..."); }
    </script>
</body>
</html>
