<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Video Gen</title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; }
        body { background: #000; color: var(--gold); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .main-card { width: 100%; max-width: 600px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; background: var(--black); position: relative; overflow: hidden; }
        
        /* صندوق النص */
        textarea { width: 100%; height: 100px; background: #111; color: #fff; border: 1px solid var(--gold); border-radius: 10px; font-size: 20px; padding: 10px; box-sizing: border-box; margin-bottom: 15px; }

        /* منطقة الفيديو */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid #333; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 12px; }
        canvas { width: 100%; height: 100%; border-radius: 10px; }

        /* الأزرار */
        .btn { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .btn-out { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
        .btn:active { transform: scale(0.98); }

        /* --- شاشة التحميل الذكية --- */
        #loader {
            display: none; /* مخفي في البداية */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid #222;
            border-top: 6px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; font-size: 20px; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="loader">
            <div class="spinner"></div>
            <p class="loading-text" id="loaderTitle">جاري المعالجة...</p>
        </div>

        <h1 style="text-align:center; margin:0 0 15px 0;">CREATIVE 2026</h1>
        
        <textarea id="scriptInput" placeholder="اكتب هنا (إتيكيت غلط... أو أي نص)"></textarea>

        <div class="video-container">
            <canvas id="vCanvas"></canvas>
            <div id="placeholder" style="position:absolute; color:#444;">المعاينة من الجهاز</div>
        </div>

        <input type="file" id="fileIn" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('fileIn').click()">📲 اختر فيديو من هاتفك</button>
        
        <button class="btn btn-out" onclick="startProcess('جاري توليد الذكاء...')">🎬 معالجة بالذكاء</button>
        <button class="btn btn-out" onclick="startProcess('جاري الحفظ النهائي...')">💾 حفظ الفيديو</button>
    </div>

    <script>
        const canvas = document.getElementById('vCanvas');
        const ctx = canvas.getContext('2d');
        const fileIn = document.getElementById('fileIn');
        let video = document.createElement('video');

        // تشغيل الفيديو من الجهاز (الهاتف)
        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    document.getElementById('placeholder').style.display = 'none';
                    video.play();
                    drawFrame();
                };
            }
        };

        function drawFrame() {
            if (!video.paused && !video.ended) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                // إضافة العلامة المائية الملكية
                ctx.font = "bold 30px Arial";
                ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
                ctx.fillText("Creative 2026", 20, canvas.height - 20);
                requestAnimationFrame(drawFrame);
            }
        }

        // دالة تشغيل شاشة التحميل
        function startProcess(msg) {
            const loader = document.getElementById('loader');
            const loaderTitle = document.getElementById('loaderTitle');
            
            loaderTitle.innerText = msg;
            loader.style.display = 'flex'; // إظهار التحميل

            // محاكاة انتهاء المعالجة بعد 4 ثوانٍ
            setTimeout(() => {
                loader.style.display = 'none'; // إخفاء التحميل
                alert("أستاذ أشرف، تمت العملية بنجاح!");
            }, 4000);
        }
    </script>
</body>
</html>
