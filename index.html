<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | التصحيح النهائي</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: var(--gold); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .main-card { max-width: 500px; margin: auto; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; background: #050505; }
        
        /* التنسيق الملكي */
        input, textarea { 
            width: 100%; background: #111; border: 1px solid #333; 
            color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box;
        }

        .video-container { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #222;
        }
        iframe, video { width: 100%; height: 100%; display: none; border: none; }
        
        /* طبقة النص الثابتة */
        #captionLayer { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.8); color: var(--gold); padding: 15px 0; 
            font-size: 22px; font-weight: bold; display: none; z-index: 10;
        }

        .btn { 
            background: var(--gold); color: #000; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>Creative 2026</h2>

        <div style="display: flex; gap: 5px;">
            <input type="text" id="videoUrl" placeholder="ضع رابط يوتيوب هنا...">
            <button class="btn" style="width: 80px; margin:0;" onclick="fetchVideo()">جلب</button>
        </div>

        <textarea id="textMsg" placeholder="اكتب النص هنا..."></textarea>
        
        <button class="btn" style="background:none; border:1px solid var(--gold); color:var(--gold);" onclick="applyText()">تطبيق النص ✍️</button>

        <div class="video-container">
            <iframe id="ytPlayer"></iframe>
            <video id="localPlayer" controls playsinline></video>
            <div id="captionLayer"></div>
        </div>

        <button class="btn" onclick="document.getElementById('fileIn').click()">📲 رفع فيديو محلي</button>
        <input type="file" id="fileIn" hidden accept="video/*">
    </div>

    <script>
        const yt = document.getElementById('ytPlayer');
        const lp = document.getElementById('localPlayer');
        const cap = document.getElementById('captionLayer');

        // الوظيفة 1: جلب الفيديو (تعمل الآن بشكل صحيح)
        function fetchVideo() {
            const url = document.getElementById('videoUrl').value;
            const id = url.match(/(?:shorts\/|v=|\/vi\/|youtu\.be\/|\/embed\/)([a-zA-Z0-9_-]{11})/);
            
            if (id) {
                lp.style.display = "none";
                yt.src = `https://www.youtube.com/embed/${id[1]}?autoplay=1`;
                yt.src += `&mute=1`; // إضافة كتم الصوت لضمان التشغيل التلقائي في المتصفحات
                yt.style.display = "block";
            } else {
                alert("الرابط غير صحيح يا هندسة!");
            }
        }

        // الوظيفة 2: تطبيق النص (تعمل بشكل منفصل)
        function applyText() {
            const val = document.getElementById('textMsg').value;
            if (val) {
                cap.innerText = val;
                cap.style.display = "block";
            } else {
                alert("اكتب نصاً أولاً");
            }
        }

        // الرفع المحلي
        document.getElementById('fileIn').onchange = function(e) {
            if (e.target.files[0]) {
                yt.style.display = "none";
                lp.src = URL.createObjectURL(e.target.files[0]);
                lp.style.display = "block";
                lp.play();
            }
        };
    </script>
</body>
</html>
