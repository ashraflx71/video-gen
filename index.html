<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Studio</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 2px solid #D4AF37; padding: 20px; border-radius: 20px; background: #050505; }
        
        /* منطقة الفيديو */
        #videoArea { 
            width: 100%; aspect-ratio: 16/9; background: #111; 
            margin: 20px 0; border-radius: 10px; position: relative; 
            border: 1px solid #333; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; border-radius: 10px; display: none; }
        
        /* النص */
        #sub { position: absolute; bottom: 10px; width: 90%; background: rgba(0,0,0,0.8); padding: 10px; font-size: 22px; font-weight: bold; border-radius: 5px; display: none; }
        textarea { width: 100%; height: 60px; font-size: 18px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #D4AF37; border-radius: 8px; padding: 10px; box-sizing: border-box; }

        .btn { background: #D4AF37; color: #000; padding: 15px; width: 100%; font-size: 20px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>CREATIVE 2026</h2>
        <p style="color: #666; font-size: 14px;">نسخة الفحص التقني - أستاذ أشرف</p>

        <textarea id="inp" placeholder="اكتب النص هنا..." oninput="updateText()"></textarea>

        <div id="videoArea">
            <video id="v" playsinline webkit-playsinline muted loop></video>
            <div id="sub"></div>
            <p id="placeholder">اضغط على "اختر فيديو" للبدء</p>
        </div>

        <input type="file" id="f" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('f').click()">📂 اختر فيديو من الهاتف</button>
        
        <button class="btn" style="background:none; border: 1px solid #D4AF37; color: #D4AF37;" onclick="forcePlay()">▶ تشغيل / تحديث</button>
    </div>

    <script>
        const v = document.getElementById('v');
        const f = document.getElementById('f');
        const s = document.getElementById('sub');
        const t = document.getElementById('inp');
        const p = document.getElementById('placeholder');

        f.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    v.src = event.target.result;
                    v.style.display = "block";
                    p.style.display = "none";
                    s.style.display = "block";
                    v.play();
                };
                reader.readAsDataURL(file); // قراءة الملف كبيانات مباشرة لتجاوز حماية المتصفح
            }
        };

        function updateText() {
            s.innerText = t.value;
        }

        function forcePlay() {
            v.play();
            updateText();
        }
    </script>
</body>
</html>
