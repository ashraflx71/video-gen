<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Safe Mode</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: var(--gold); font-family: Arial, sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .studio-box { width: 100%; max-width: 500px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; background: #050505; position: relative; margin: auto; }

        /* منطقة النص */
        #inputTxt { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid var(--gold); border-radius: 10px; font-size: 20px; padding: 10px; margin-bottom: 15px; }

        /* حاوية الفيديو البديلة */
        .video-container { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; 
            overflow: hidden; position: relative; border: 1px solid #333;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* الطبقة الذهبية فوق الفيديو (بديلة الكنفا) */
        .overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* عشان تقدر تلمس الفيديو تحتها */
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 15px; box-sizing: border-box;
        }

        .watermark { text-align: left; font-size: 18px; opacity: 0.5; font-weight: bold; }
        .subtitle-box { 
            background: rgba(0,0,0,0.6); color: var(--gold); 
            padding: 10px; border-radius: 8px; font-size: 22px; font-weight: bold;
        }

        .btn { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; font-size: 22px; font-weight: bold; border-radius: 12px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="studio-box">
        <h1 style="font-size: 28px;">CREATIVE 2026</h1>
        
        <textarea id="inputTxt" oninput="updateText()" placeholder="اكتب نص الإتيكيت هنا..."></textarea>

        <div class="video-container">
            <video id="mainVideo" playsinline muted loop></video>
            
            <div class="overlay-layer">
                <div class="watermark">Creative 2026</div>
                <div id="displaySub" class="subtitle-box" style="display:none;"></div>
            </div>
        </div>

        <input type="file" id="fileIn" accept="video/*" style="display:none">
        <button class="btn" onclick="document.getElementById('fileIn').click()">📲 ارفع فيديو من هاتفك</button>
        
        <button class="btn" style="background:transparent; color:var(--gold); border:1px solid var(--gold);" onclick="alert('جاري المعالجة النهائية...')">🎬 حفظ العمل</button>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const fileIn = document.getElementById('fileIn');
        const displaySub = document.getElementById('displaySub');
        const inputTxt = document.getElementById('inputTxt');

        fileIn.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.play();
                updateText();
            }
        };

        function updateText() {
            const val = inputTxt.value;
            if (val.trim() !== "") {
                displaySub.innerText = val;
                displaySub.style.display = "block";
            } else {
                displaySub.style.display = "none";
            }
        }
    </script>
</body>
</html>
